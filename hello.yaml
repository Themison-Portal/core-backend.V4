apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: core-backend-trials
  labels:
    cloud.googleapis.com/location: europe-west1
  annotations:
    run.googleapis.com/ingress: all
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/maxScale: '1'
    spec:
      containers:
      - image: gcr.io/cloudrun/hello
        resources:
          limits:
            memory: 512Mi
